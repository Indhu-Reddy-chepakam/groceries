{% extends 'base.html' %}
{% load static %}

{% block content %}

<!-- CONTACT SECTION -->
<section style="width:100%; min-height:100vh; display:flex; font-family:Arial, sans-serif;">

  <!-- LEFT SIDE : GET IN TOUCH -->
  <div style="
    flex:1;
    background:#0c1445;
    color:white;
    padding:80px 60px;
  ">

    <h1 style="font-size:48px; margin-bottom:20px;">Get In Touch</h1>

    <p style="font-size:18px; margin-bottom:40px;">
      We’re here to help you. Reach out to us anytime.
    </p>

    <div style="margin-bottom:25px;">
      <p style="font-size:20px; margin:0;">📞 <strong>Phone</strong></p>
      <p style="margin:5px 0 0;">+91 123456789</p>
    </div>

    <div style="margin-bottom:25px;">
      <p style="font-size:20px; margin:0;">✉️ <strong>Email</strong></p>
      <p style="margin:5px 0 0;">unityunion@gmail.com</p>
    </div>

    <div>
      <p style="font-size:20px; margin:0;">📍 <strong>Address</strong></p>
      <p style="margin:5px 0 0;">
        Tada, Tirupati dist,<br>
        Andhra Pradesh – 524401
      </p>
    </div>

  </div>

  <!-- RIGHT SIDE : SEND MESSAGE -->
  <div style="
    flex:1;
    background:#ffffff;
    padding:60px 50px;
    display:flex;
    align-items:flex-start;
    padding-top:30px;
  ">

    <form method="post" style="width:100%; max-width:520px; margin:auto;">
      {% csrf_token %}

      <h1 style="
        font-size:38px;
        margin-bottom:10px;
        color:#0c1445;
        text-align:center;
        font-weight:normal;
      ">
        Send Message
      </h1>

      <input type="text" name="name" placeholder="Name" required
        style="width:100%; padding:14px; margin-bottom:15px;
        border:1px solid #ccc; border-radius:6px; font-size:16px;">

      <input type="email" name="email" placeholder="Email" required
        style="width:100%; padding:14px; margin-bottom:15px;
        border:1px solid #ccc; border-radius:6px; font-size:16px;">

      <input type="text" name="phone" placeholder="Phone Number"
        style="width:100%; padding:14px; margin-bottom:15px;
        border:1px solid #ccc; border-radius:6px; font-size:16px;">

      <textarea name="message" placeholder="Message" rows="5" required
        style="width:100%; padding:14px; margin-bottom:25px;
        border:1px solid #ccc; border-radius:6px; font-size:16px;"></textarea>

      <button type="submit"
        style="
          width:100%;
          background:#0c1445;
          color:white;
          padding:14px;
          font-size:18px;
          border:none;
          border-radius:6px;
          cursor:pointer;
        ">
        Send Message
      </button>

    </form>

  </div>

</section>

{% endblock %}
