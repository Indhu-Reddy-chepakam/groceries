{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}UNITY UNION{% endblock %}</title>

  <!-- Bootstrap & FontAwesome -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    .top-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 15px;
      background: #0c1445;
      color: white;
      font-size: 14px;
    }

    #navbar { background-color: lightgray; }
    #login:hover { background-color: darkblue; }
    #cart-msg{
      position: fixed;
      top: 10px;
      right: 10px;
      background: #4b3720;
      color: white;
      padding: 10px 20px;
      border-radius: 5px;
      display: none;
      z-index: 1000;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    #drop a:hover{ background:#f2f2f2; }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body>

<!-- ===== TOP HEADER ===== -->
<div class="top-header">
  <span><i class="fa-solid fa-phone me-1"></i>123456789</span>
  <span><i class="fa-solid fa-user me-1"></i>Account</span>
  <span><i class="fa-solid fa-location-dot me-1"></i>Location</span>
  <span><i class="fa-solid fa-circle-question me-1"></i>Help</span>
  <strong>Flat 20% discount</strong>
 <div class="dropdown">
  <button
    class="btn btn-sm btn-success dropdown-toggle text-white"
    type="button"
    id="authDropdown"
    data-bs-toggle="dropdown"
    aria-expanded="false"
    style="width: 140px; font-weight: 400;"
  >
    Sign In / Sign Up
  </button>

  <ul class="dropdown-menu" aria-labelledby="authDropdown">
    <li>
      <a class="dropdown-item" href="{% url 'login' %}">
        <i class="fa fa-sign-in-alt me-2"></i> Login
      </a>
    </li>
    <li>
      <a class="dropdown-item" href="{% url 'register' %}">
        <i class="fa fa-user-plus me-2"></i> Register
      </a>
    </li>
  </ul>
</div>
</div>

<div id="navbar"></div>
<div id="cart-msg"></div>

<!-- ===== NAVBAR SCRIPT ===== -->
<script>
const navbar = document.getElementById("navbar");

/* ===== BRAND ===== */
const brand = document.createElement("div");
brand.style.display="flex";
brand.style.alignItems="center";
brand.style.gap="12px";

const logo=document.createElement("img");
logo.src="{% static 'images/logo.png' %}";
logo.style.height="55px";
logo.style.width="55px";
logo.style.borderRadius="50%";

const title=document.createElement("span");
title.innerHTML=`<span style="color:darkblue;font-weight:bold;font-size:26px;">UNITY</span>
<span style="color:green;font-weight:bold;font-size:26px;">UNION</span>`;
brand.append(logo,title);

/* ===== MENU ===== */
const menu=document.createElement("div");
menu.style.display="flex";
menu.style.alignItems="center";
menu.style.gap="25px";

/* ===== SEARCH ===== */
const search=document.createElement("div");
search.style.position="relative";
search.innerHTML=`<input id="searchInput" type="text" placeholder="Search..." style="padding:5px 12px;border:1px solid #ccc;border-radius:20px;width:200px;">
<div id="searchResults" style="
display:none;
position:absolute;
top:40px;
left:0;
width:200px;
background:white;
border:1px solid #ccc;
border-radius:6px;
z-index:3000;
"></div>`;

/* ===== LINK FUNCTION ===== */
function link(text, icon, url){
  return `<a href="${url}" style="text-decoration:none;color:black;"><i class="${icon} me-1"></i>${text}</a>`;
}

/* ===== CATEGORIES ===== */
const categories = document.createElement("div");
categories.style.position="relative";
categories.innerHTML=`
<span style="cursor:pointer;"><i class="fa fa-layer-group me-1"></i>Categories</span>
<div id="drop" style="display:none;position:absolute;top:30px;background:white;border:1px solid #ccc;border-radius:6px;min-width:140px;">
  <div style="padding:8px;"><a href="{% url 'vegetables' %}" style="text-decoration:none;color:black;">Vegetables</a></div>
  <div style="padding:8px;"><a href="{% url 'fruits' %}" style="text-decoration:none;color:black;">Fruits</a></div>
  <div style="padding:8px;"><a href="{% url 'groceries' %}" style="text-decoration:none;color:black;">Groceries</a></div>
  <div style="padding:8px;"><a href="{% url 'stationery' %}" style="text-decoration:none;color:black;">Stationery</a></div>
  <div style="padding:8px;"><a href="{% url 'essentials' %}" style="text-decoration:none;color:black;">Essentials</a></div>
  <div style="padding:8px;"><a href="{% url 'decor' %}" style="text-decoration:none;color:black;">Decor</a></div>
</div>
`;

const drop = categories.querySelector("#drop");
drop.style.zIndex = "1000";
drop.style.background = "white";
drop.style.border = "1px solid #ccc";
drop.style.borderRadius = "6px";
drop.style.minWidth = "140px";
drop.style.position = "absolute";
drop.style.top = "30px";

categories.onclick=()=>{ drop.style.display = drop.style.display === "block" ? "none" : "block"; };

/* ===== MENU ORDER ===== */
menu.append(
  search,
  document.createRange().createContextualFragment(link("Home","fa fa-house","{% url 'index' %}")),
  document.createRange().createContextualFragment(link("About","fa fa-user","#about")),
  categories,
  document.createRange().createContextualFragment(link("Contact","fa fa-envelope","{% url 'contact' %}")),
  document.createRange().createContextualFragment(link("Cart","fa fa-shopping-cart","{% url 'cart' %}"))
);

navbar.style.display="flex";
navbar.style.justifyContent="space-between";
navbar.style.padding="10px 20px";
navbar.append(brand,menu);

/* ===== SEARCH LOGIC ===== */
const searchInput = document.getElementById("searchInput");
const searchResults = document.getElementById("searchResults");

const searchData = [
  /*veg*/
  { name: "Vegetables", url: "{% url 'vegetables' %}" },
  { name: "tomotoes", url: "{% url 'vegetables' %}" },
  { name: "potatoes", url: "{% url 'vegetables' %}" },
  { name: "onions", url: "{% url 'vegetables' %}" },
  { name: "carrots", url: "{% url 'vegetables' %}" },
/*fruits*/
  { name: "Fruits", url: "{% url 'fruits' %}" },
  { name: "apples", url: "{% url 'fruits' %}" },
  { name: "grapes", url: "{% url 'fruits' %}" },
  { name: "pineapples", url: "{% url 'fruits' %}" },
  { name: "oranges", url: "{% url 'fruits' %}" },
  /*grocery*/
  { name: "Groceries", url: "{% url 'groceries' %}" },
  { name: "rice", url: "{% url 'groceries' %}" },
  { name: "wheat", url: "{% url 'groceries' %}" },
  { name: "sugar", url: "{% url 'groceries' %}" },
  { name: "black gram", url: "{% url 'groceries' %}" },
/*statinoery*/

  { name: "Stationery", url: "{% url 'stationery' %}" },
  { name: "pens", url: "{% url 'stationery' %}" },
  { name: "pencils", url: "{% url 'stationery' %}" },
  { name: "eraser", url: "{% url 'stationery' %}" },
  { name: "note books", url: "{% url 'stationery' %}" },
  /*essentials*/

  { name: "Essentials", url: "{% url 'essentials' %}" },
   { name: "detergent", url: "{% url 'essentials' %}" },
    { name: "dish wash", url: "{% url 'essentials' %}" },
     { name: "floor cleaner", url: "{% url 'essentials' %}" },
      { name: "toliet cleaner", url: "{% url 'essentials' %}" },
    /*home decor*/
  { name: "Home Decor", url: "{% url 'decor' %}" },
  { name: "Wall Clock", url: "{% url 'decor' %}" },
  { name: "Table Lamp", url: "{% url 'decor' %}" },
  { name: "Flower Vase", url: "{% url 'decor' %}" },
  { name: "Wall art", url: "{% url 'decor' %}" }

];

searchInput.addEventListener("input", () => {
  const value = searchInput.value.toLowerCase();
  searchResults.innerHTML = "";

  if (!value) { searchResults.style.display = "none"; return; }

  const matches = searchData.filter(item => item.name.toLowerCase().includes(value));

  if (matches.length === 0) {
    searchResults.innerHTML = `<div style="padding:8px;color:gray;">No results</div>`;
  } else {
    matches.forEach(item => {
      const div = document.createElement("div");
      div.innerText = item.name;
      div.style.padding = "8px";
      div.style.cursor = "pointer";
      div.onclick = () => window.location.href = item.url;
      searchResults.appendChild(div);
    });
  }

  searchResults.style.display = "block";
});

document.addEventListener("click", e => {
  if (!searchInput.contains(e.target)) {
    searchResults.style.display = "none";
  }
});
</script>

<!-- ===== PAGE CONTENT ===== -->
{% block content %}{% endblock %}

</body>
</html>
