{% extends 'base.html' %}
{% load static %}

{% block title %}Home Decor{% endblock %}

{% block content %}

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  background: linear-gradient(to right, #dfacd9, #e8bae4);
}

.products{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap:25px;
  padding:20px;
}

.card{
  background:#fff;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:260px;
  object-fit:cover;
}

.card-body{
  padding:15px;
  text-align:center;
}

select{
  width:100%;
  padding:8px;
  margin-bottom:10px;
}

.price{
  font-size:20px;
  font-weight:bold;
  margin-bottom:10px;
}

button{
  width:100%;
  background:#2f6f5f;
  color:white;
  padding:12px;
  border:none;
  border-radius:6px;
}
button:hover{ background:#214d43; }
</style>

<!-- TOAST -->
<div id="cart-msg" style="
position:fixed;
top:15px;
right:15px;
background:#2f6f5f;
color:#fff;
padding:10px 20px;
border-radius:6px;
display:none;
z-index:9999;">
</div>

<h2 style="text-align:center;color:#214d43;font-weight:1000;">
  Home Decor
</h2>

<div class="products">

<!-- WALL CLOCK -->
<div class="card">
  <img src="{% static 'images/wallclock.png' %}">
  <div class="card-body">
    <form method="POST" class="add-to-cart-form">
      {% csrf_token %}
      <h3>Wall Clock</h3>
      <input type="hidden" name="name" value="Wall Clock">
      <input type="hidden" name="price" value="899">

      <select name="type" required>
        <option value="">Type</option>
        <option>Round</option>
        <option>Square</option>
      </select>

      <select name="weight" required>
          <option value="">Quantity</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          
        </select>

      <div class="price">₹ 899</div>
      <button>Add to Cart</button>
    </form>
  </div>
</div>

<!-- TABLE LAMP -->
<div class="card">
  <img src="{% static 'images/lamp.png' %}">
  <div class="card-body">
    <form method="POST" class="add-to-cart-form">
      {% csrf_token %}
      <h3>Table Lamp</h3>
      <input type="hidden" name="name" value="Table Lamp">
      <input type="hidden" name="price" value="1299">

      <select name="color" required>
        <option value="">Color</option>
        <option>White</option>
        <option>Black</option>
      </select>

      <select name="weight" required>
          <option value="">Quantity</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          
        </select>

      <div class="price">₹ 1299</div>
      <button>Add to Cart</button>
    </form>
  </div>
</div>

<!-- FLOWER VASE -->
<div class="card">
  <img src="{% static 'images/vase.png' %}">
  <div class="card-body">
    <form method="POST" class="add-to-cart-form">
      {% csrf_token %}
      <h3>Flower Vase</h3>
      <input type="hidden" name="name" value="Flower Vase">
      <input type="hidden" name="price" value="499">

      <select name="material" required>
        <option value="">Material</option>
        <option>Ceramic</option>
        <option>Glass</option>
      </select>

      <select name="weight" required>
          <option value="">Quantity</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          
        </select>

      <div class="price">₹ 499</div>
      <button>Add to Cart</button>
    </form>
  </div>
</div>

<div class="card">
  <img src="{% static 'images/art.png' %}">
  <div class="card-body">
    <form method="POST" class="add-to-cart-form">
      {% csrf_token %}
      <h3>Wall Art</h3>
      <input type="hidden" name="name" value="Wall Art">
      <input type="hidden" name="price" value="1599">

      <select name="size" required>
        <option value="">Size</option>
        <option>Small</option>
        <option>Medium</option>
        <option>Large</option>
      </select>

      <select name="weight" required>
          <option value="">Quantity</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          
        </select>

      <div class="price">₹ 1599</div>
      <button>Add to Cart</button>
    </form>
  </div>
</div>

</div>

<script>
document.querySelectorAll('.add-to-cart-form').forEach(form=>{
  form.addEventListener('submit',e=>{
    e.preventDefault();
    const data=new FormData(form);

    fetch("{% url 'add_to_cart' %}",{
      method:'POST',
      headers:{
        'X-CSRFToken':data.get('csrfmiddlewaretoken'),
        'X-Requested-With':'XMLHttpRequest'
      },
      body:data
    })
    .then(res=>res.json())
    .then(res=>{
      const box=document.getElementById('cart-msg');
      box.innerText = res.message + " | ₹" + res.total_price;
      box.style.display='block';
      setTimeout(()=>box.style.display='none',2000);
    });
  });
});
</script>

{% endblock %}
