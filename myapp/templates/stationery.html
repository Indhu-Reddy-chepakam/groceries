{% extends 'base.html' %}
{% load static %}

{% block title %}Stationery{% endblock %}

{% block content %}

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  background: linear-gradient(to right, #e8f0ff, #d0e0ff);
}

/* GRID */
.products{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap:25px;
  padding: 20px;
}

/* CARD */
.card{
  background:#fff;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* IMAGE */
.card img{
  width:100%;
  height:260px;
  object-fit:cover;
}

/* CONTENT */
.card-body{
  padding:15px;
  text-align:center;
}

h3{
  font-size:18px;
  margin:10px 0;
}

select{
  width:100%;
  padding:8px;
  border-radius:5px;
  border:1px solid #ccc;
  margin-bottom:10px;
}

.price{
  font-size:20px;
  font-weight:bold;
  margin-bottom:15px;
}

button{
  width:100%;
  background:#2b4f81;
  color:white;
  padding:12px;
  border:none;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#1d3557;
}
</style>

<!-- TOAST MESSAGE -->
<div id="cart-msg" style="
    position: fixed;
    top: 10px;
    right: 10px;
    background: #2b4f81;
    color: white;
    padding: 10px 20px;
    border-radius: 5px;
    display: none;
    z-index: 1000;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
"></div>

<h2 style="text-align:center;padding:10px;color:#1d3557;font-weight:1000;">
  Stationery Collection
</h2>

<div class="products">

  <!-- NOTEBOOK -->
  <div class="card">
    <img src="{% static 'images/notebook.avif' %}" alt="book">
    <div class="card-body">
      <form method="POST" class="add-to-cart-form">
        {% csrf_token %}
        <h3><b>Note Book</b></h3>
        <input type="hidden" name="name" value="Notebook">
        <input type="hidden" name="price" value="50">
        <select name="weight" required>
          <option value="">Quantity</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>
        <div class="price">Rs. 50.00</div>
        <button type="submit">Add to Cart</button>
      </form>
    </div>
  </div>

  <!-- PEN -->
  <div class="card">
    <img src="{% static 'images/pen.png' %}" alt="Pen">
    <div class="card-body">
      <form method="POST" class="add-to-cart-form">
        {% csrf_token %}
        <h3><b>Pen</b></h3>
        <input type="hidden" name="name" value="Pen">
        <input type="hidden" name="price" value="10">
        <select name="weight" required>
          <option value="">Quantity</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>
        <div class="price">Rs. 10.00</div>
        <button type="submit">Add to Cart</button>
      </form>
    </div>
  </div>

  <!-- PENCIL -->
  <div class="card">
    <img src="{% static 'images/pencils.png' %}" alt="Pencil">
    <div class="card-body">
      <form method="POST" class="add-to-cart-form">
        {% csrf_token %}
        <h3><b>Pencil</b></h3>
        <input type="hidden" name="name" value="Pencil">
        <input type="hidden" name="price" value="5">
        <select name="weight" required>
          <option value="">Quantity</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>
        <div class="price">Rs. 5.00</div>
        <button type="submit">Add to Cart</button>
      </form>
    </div>
  </div>

  <!-- ERASER -->
  <div class="card">
    <img src="{% static 'images/eraser.png' %}" alt="Eraser">
    <div class="card-body">
      <form method="POST" class="add-to-cart-form">
        {% csrf_token %}
        <h3><b>Eraser</b></h3>
        <input type="hidden" name="name" value="Eraser">
        <input type="hidden" name="price" value="5">
        <select name="weight" required>
          <option value="">Quantity</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          
        </select>
        <div class="price">Rs. 5.00</div>
        <button type="submit">Add to Cart</button>
      </form>
    </div>
  </div>

</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const forms = document.querySelectorAll('.add-to-cart-form');
  const msgBox = document.getElementById('cart-msg');

  forms.forEach(form => {
    form.addEventListener('submit', function(e) {
      e.preventDefault();

      const data = new FormData(this);

      fetch("{% url 'add_to_cart' %}", {
        method: "POST",
        headers: {
          'X-CSRFToken': data.get('csrfmiddlewaretoken'),
          'X-Requested-With': 'XMLHttpRequest'   // 🔥 REQUIRED
        },
        body: data
      })
      .then(response => response.json())
      .then(result => {
        if (msgBox) {
          msgBox.innerText = result.message + " | ₹" + result.total_price;
          msgBox.style.display = 'block';
          msgBox.style.opacity = '1';

          setTimeout(() => {
            msgBox.style.transition = 'opacity 0.5s';
            msgBox.style.opacity = '0';
          }, 2000);

          setTimeout(() => {
            msgBox.style.display = 'none';
            msgBox.style.transition = 'none';
          }, 2500);
        }
      })
      .catch(error => console.error('Error:', error));
    });
  });
});
</script>

{% endblock %}
